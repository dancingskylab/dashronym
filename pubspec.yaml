name: dashronym
description: Accessible inline acronym glossary tooltips for Flutter, with rich entries, aliases, scoped configuration, and portable JSON.
version: 0.1.0
homepage: https://pub.dev/packages/dashronym
repository: https://github.com/dancingskylab/dashronym
issue_tracker: https://github.com/dancingskylab/dashronym/issues
topics:
  - text
  - tooltip
  - documentation
  - acronyms
  - a11y

screenshots:
  - description: 'Animated overview of Dashronym tooltips responding to user taps.'
    path: screenshots/0_dashronym.gif
  - description: 'Landscape tooltip showcasing custom builder content.'
    path: screenshots/1_dashronym_landscape_tooltip_builder.png
  - description: 'Landscape tooltip constrained within the viewport.'
    path: screenshots/2_dashronym_landscape_tooltip.png
  - description: 'Portrait tooltip with viewport-safe positioning.'
    path: screenshots/3_dashronym_portrait_tooltip.png

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.38.1'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
